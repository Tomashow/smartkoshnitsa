<!DOCTYPE html>
<html lang="bg">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartKoshnitsa</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f5f5;
      color: #222;
      min-height: 100vh;
    }

    header {
      background: #d32f2f;
      color: #fff;
      padding: 20px 24px;
    }

    header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    header p {
      font-size: 0.85rem;
      opacity: 0.85;
      margin-top: 2px;
    }

    .search-bar {
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: 16px 24px;
      display: flex;
      gap: 10px;
    }

    .search-bar input {
      flex: 1;
      padding: 10px 14px;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      outline: none;
      transition: border-color 0.15s;
    }

    .search-bar input:focus {
      border-color: #d32f2f;
    }

    .search-bar button {
      padding: 10px 20px;
      background: #d32f2f;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.15s;
    }

    .search-bar button:hover {
      background: #b71c1c;
    }

    #status {
      padding: 10px 24px;
      font-size: 0.85rem;
      color: #888;
      min-height: 36px;
    }

    #results {
      padding: 0 24px 32px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 14px;
    }

    .card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .card-store {
      display: inline-block;
      background: #d32f2f;
      color: #fff;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      align-self: flex-start;
    }

    .card-name {
      font-size: 0.95rem;
      font-weight: 600;
      line-height: 1.35;
    }

    .card-price-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }

    .card-price {
      font-size: 1.25rem;
      font-weight: 700;
      color: #d32f2f;
    }

    .card-original {
      font-size: 0.85rem;
      color: #999;
      text-decoration: line-through;
    }

    .card-unit {
      font-size: 0.8rem;
      color: #666;
    }

    .card-price-eur {
      font-size: 0.78rem;
      color: #888;
    }

    .card-discount {
      font-size: 0.78rem;
      background: #e8f5e9;
      color: #2e7d32;
      padding: 1px 6px;
      border-radius: 3px;
      font-weight: 600;
    }

    .card-validity {
      font-size: 0.75rem;
      color: #bbb;
      margin-top: 2px;
    }

    .card-img {
      width: 100%;
      max-height: 140px;
      object-fit: contain;
      border-radius: 4px;
      background: #f9f9f9;
    }

    .card-store[data-slug="billa"]    { background: #e53935; }
    .card-store[data-slug="kaufland"] { background: #e65100; }
    .card-store[data-slug="lidl"]     { background: #1565c0; }

    .empty {
      grid-column: 1/-1;
      text-align: center;
      color: #aaa;
      padding: 48px 0;
      font-size: 1rem;
    }

    #filter-bar {
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: 10px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    #sort-select {
      padding: 6px 10px;
      font-size: 0.88rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      outline: none;
      cursor: pointer;
      background: #fafafa;
      color: #333;
    }

    #sort-select:focus {
      border-color: #d32f2f;
    }

    .store-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.85rem;
      cursor: pointer;
      user-select: none;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid #ddd;
      transition: opacity 0.15s;
    }

    .store-toggle input[type="checkbox"] {
      display: none;
    }

    .store-toggle[data-slug="kaufland"] { border-color: #e65100; color: #e65100; }
    .store-toggle[data-slug="billa"]    { border-color: #e53935; color: #e53935; }
    .store-toggle[data-slug="lidl"]     { border-color: #1565c0; color: #1565c0; }

    .store-toggle.inactive {
      opacity: 0.4;
    }
  </style>
</head>

<body>

  <header>
    <h1>🛒 SmartKoshnitsa</h1>
    <p>Търсене на промоции в Bulgarian supermarkets</p>
  </header>

  <div class="search-bar">
    <input id="q" type="text" placeholder="Търси продукт... (напр. мляко, хляб, сирене)" autofocus>
    <button id="btn">Търси</button>
  </div>

  <div id="filter-bar">
    <select id="sort-select">
      <option value="score">По релевантност</option>
      <option value="price-asc">Цена ↑</option>
      <option value="price-desc">Цена ↓</option>
    </select>
    <label class="store-toggle" data-slug="kaufland" id="toggle-kaufland">
      <input type="checkbox" id="show-kaufland" checked> Кауфланд
    </label>
    <label class="store-toggle" data-slug="billa" id="toggle-billa">
      <input type="checkbox" id="show-billa" checked> Билла
    </label>
    <label class="store-toggle" data-slug="lidl" id="toggle-lidl">
      <input type="checkbox" id="show-lidl" checked> Лидл
    </label>
  </div>

  <div id="status"></div>
  <div id="results"></div>

  <script>
    const input = document.getElementById('q');
    const btn = document.getElementById('btn');
    const status = document.getElementById('status');
    const results = document.getElementById('results');
    const sortSelect = document.getElementById('sort-select');
    const showKaufland = document.getElementById('show-kaufland');
    const showBilla = document.getElementById('show-billa');
    const showLidl = document.getElementById('show-lidl');

    let debounceTimer;
    let lastResults = [];

    const BGN_EUR = 1.95583;

    function fmt(n) {
      return Number(n).toFixed(2);
    }

    function toEur(bgn) {
      return (bgn / BGN_EUR).toFixed(2);
    }

    function discount(orig, curr) {
      if (!orig || orig <= curr) return '';
      const pct = Math.round((1 - curr / orig) * 100);
      return pct > 0 ? `-${pct}%` : '';
    }

    function render(items) {
      if (!items.length) {
        results.innerHTML = '<div class="empty">Няма намерени продукти</div>';
        return;
      }
      results.innerHTML = items.map(p => {
        const disc = discount(p.original_price, p.price);
        const unit = p.unit ? `<span class="card-unit">/ ${p.unit}</span>` : '';
        const orig = p.original_price
          ? `<span class="card-original">${toEur(p.original_price)} €</span>`
          : '';
        const badge = disc ? `<span class="card-discount">${disc}</span>` : '';
        const validity = p.valid_to ? `<div class="card-validity">до ${p.valid_to}</div>` : '';
        const img = p.image_url
          ? `<img src="${p.image_url}" alt="${p.name}" class="card-img" loading="lazy">`
          : '';
        return `
        <div class="card">
          <span class="card-store" data-slug="${p.store_slug}">${p.store_name}</span>
          ${img}
          <div class="card-name">${p.name}</div>
          <div class="card-price-row">
            <span class="card-price">${toEur(p.price)} €</span>
            ${unit}${orig}${badge}
          </div>
          <div class="card-price-eur">${fmt(p.price)} лв.</div>
          ${validity}
        </div>`;
      }).join('');
    }

    function applyFilters() {
      let items = lastResults.slice();

      if (!showKaufland.checked) items = items.filter(p => p.store_slug !== 'kaufland');
      if (!showBilla.checked)    items = items.filter(p => p.store_slug !== 'billa');
      if (!showLidl.checked)     items = items.filter(p => p.store_slug !== 'lidl');

      const sort = sortSelect.value;
      if (sort === 'price-asc')  items.sort((a, b) => a.price - b.price);
      if (sort === 'price-desc') items.sort((a, b) => b.price - a.price);

      render(items);
    }

    async function doSearch() {
      const q = input.value.trim();
      if (!q) {
        status.textContent = '';
        results.innerHTML = '';
        lastResults = [];
        return;
      }
      status.textContent = 'Търсене...';
      try {
        const res = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
        const data = await res.json();
        lastResults = data;
        status.textContent = data.length
          ? `${data.length} резултата за „${q}"`
          : `Няма резултати за „${q}"`;
        applyFilters();
      } catch (e) {
        status.textContent = 'Грешка при търсенето';
        results.innerHTML = '';
      }
    }

    function syncToggleStyle(checkbox, labelId) {
      document.getElementById(labelId).classList.toggle('inactive', !checkbox.checked);
    }

    showKaufland.addEventListener('change', () => {
      syncToggleStyle(showKaufland, 'toggle-kaufland');
      applyFilters();
    });
    showBilla.addEventListener('change', () => {
      syncToggleStyle(showBilla, 'toggle-billa');
      applyFilters();
    });
    showLidl.addEventListener('change', () => {
      syncToggleStyle(showLidl, 'toggle-lidl');
      applyFilters();
    });
    sortSelect.addEventListener('change', applyFilters);

    btn.addEventListener('click', doSearch);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
    input.addEventListener('input', () => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(doSearch, 300);
    });
  </script>

</body>

</html>
